name: EAS Build Mobile App

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'ios'
        type: choice
        options:
          - ios
          - android
          - all
      profile:
        description: 'EAS build profile (configured in eas.json)'
        required: true
        default: 'production-strike'
        type: choice
        options:
          - production-strike
          - production-strikeboxing
          - production
          - preview
          - development
      runner:
        description: 'Where to run the build (Expo Cloud or Local macOS runner)'
        required: true
        default: 'eas-cloud'
        type: choice
        options:
          - eas-cloud
          - local
      submit:
        description: 'Automatically submit to App Store / Google Play'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build & Publish App
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: |
          cd mobile
          npm ci

      - name: Run EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          
          PLATFORM="${{ github.event.inputs.platform }}"
          PROFILE="${{ github.event.inputs.profile }}"
          RUNNER="${{ github.event.inputs.runner }}"
          SUBMIT="${{ github.event.inputs.submit }}"
          
          echo "Building platform: $PLATFORM with profile: $PROFILE on runner: $RUNNER"
          
          if [ "$RUNNER" = "local" ]; then
            eas build --platform "$PLATFORM" --local --profile "$PROFILE" --non-interactive
          else
            if [ "$SUBMIT" = "true" ]; then
              eas build --platform "$PLATFORM" --profile "$PROFILE" --auto-submit --non-interactive
            else
              eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive
            fi
          fi

      - name: Submit Local Build to App Store / Google Play
        if: ${{ github.event.inputs.submit == 'true' && github.event.inputs.runner == 'local' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          
          # Find the compiled build file
          IPA_FILE=$(ls *.ipa 2>/dev/null | head -n 1)
          AAB_FILE=$(ls *.aab 2>/dev/null | head -n 1)
          APK_FILE=$(ls *.apk 2>/dev/null | head -n 1)
          
          if [ -n "$IPA_FILE" ]; then
            echo "Submitting iOS build: $IPA_FILE"
            eas submit --platform ios --profile "${{ github.event.inputs.profile }}" --path "$IPA_FILE" --non-interactive
          elif [ -n "$AAB_FILE" ]; then
            echo "Submitting Android build: $AAB_FILE"
            eas submit --platform android --profile "${{ github.event.inputs.profile }}" --path "$AAB_FILE" --non-interactive
          elif [ -n "$APK_FILE" ]; then
            echo "Submitting Android build: $APK_FILE"
            eas submit --platform android --profile "${{ github.event.inputs.profile }}" --path "$APK_FILE" --non-interactive
          else
            echo "No compiled build files found to submit."
            exit 1
          fi

      - name: Upload Build Artifacts (IPAs / APKs)
        uses: actions/upload-artifact@v4
        with:
          name: app-build-files
          path: |
            mobile/*.ipa
            mobile/*.apk
            mobile/*.aab
          if-no-files-found: warn
